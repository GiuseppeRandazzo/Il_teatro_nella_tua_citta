name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        # Imposta l'href in base al nome del tuo repository: "Il_teatro_nella_tua_citta"
        run: npm run build -- --base-href /Il_teatro_nella_tua_citta/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Di default l'eseguibile di building di Angular 17+ ("@angular/build:application")
          # posiziona i file compilati in "dist/<nome-progetto>/browser".
          # Controlla la cartella esatta generata in locale, se fosse diversa (es. solo dist/teatro_in_citta).
          path: 'dist/teatro_in_citta/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
