<div class="show-card" [routerLink]="['/spettacolo', show.id]">
  <div class="show-image">
    <img [src]="show.immagine" [alt]="show.titolo" />
    <button
      class="favorite-btn"
      [class.active]="isFavorite()"
      (click)="toggleFavorite($event)"
      title="Aggiungi ai preferiti"
    >
      {{ isFavorite() ? '❤️' : '🤍' }}
    </button>
  </div>

  <div class="show-content">
    <h3>{{ show.titolo }}</h3>
    <p class="teatro">{{ show.teatro }} - {{ show.citta }}</p>
    <p class="genere">{{ show.genere }}</p>
    <p class="descrizione">{{ show.descrizione }}</p>
    <div class="show-footer">
      <span class="prezzo">€{{ show.prezzoMin }} - €{{ show.prezzoMax }}</span>
      <span class="date">{{ show.date.length }} date</span>
    </div>
  </div>
</div>
