<div class="search-page">
  <div class="container">
    <h1>🔍 Ricerca Avanzata</h1>

    <div class="search-form">
      <div class="form-group full-width">
        <label>🔎 Cerca per titolo o descrizione</label>
        <input
          type="text"
          [(ngModel)]="searchText"
          placeholder="Es: Romeo e Giulietta..."
          class="form-control"
        />
      </div>

      <div class="form-group">
        <label>🎭 Genere</label>
        <select [(ngModel)]="selectedGenre" class="form-control">
          <option value="">Tutti i generi</option>
          <option *ngFor="let genre of genres" [value]="genre">{{ genre }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>🌆 Città</label>
        <select [(ngModel)]="selectedCity" class="form-control">
          <option value="">Tutte le città</option>
          <option *ngFor="let city of cities" [value]="city">{{ city }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>🏛️ Teatro</label>
        <select [(ngModel)]="selectedTeatro" class="form-control">
          <option value="">Tutti i teatri</option>
          <option *ngFor="let teatro of teatri" [value]="teatro">{{ teatro }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>💰 Prezzo Minimo (€)</label>
        <input
          type="number"
          [(ngModel)]="minPrice"
          placeholder="Es: 20"
          min="0"
          class="form-control"
        />
      </div>

      <div class="form-group">
        <label>💰 Prezzo Massimo (€)</label>
        <input
          type="number"
          [(ngModel)]="maxPrice"
          placeholder="Es: 100"
          min="0"
          class="form-control"
        />
      </div>

      <div class="form-actions full-width">
        <button class="btn-search" (click)="search()">🔍 Cerca</button>
        <button class="btn-reset" (click)="resetFilters()">🔄 Reset</button>
      </div>
    </div>

    <div *ngIf="loading" class="loading">
      <p>Caricamento...</p>
    </div>

    <div *ngIf="!loading && hasSearched && filteredShows.length === 0" class="no-results">
      <span class="icon">😔</span>
      <h2>Nessun risultato trovato</h2>
      <p>Prova a modificare i filtri di ricerca</p>
    </div>

    <div *ngIf="!loading && hasSearched && filteredShows.length > 0" class="results">
      <h2>📋 Risultati trovati: {{ filteredShows.length }}</h2>
      <div class="shows-grid">
        <app-show-card *ngFor="let show of filteredShows" [show]="show"> </app-show-card>
      </div>
    </div>
  </div>
</div>
