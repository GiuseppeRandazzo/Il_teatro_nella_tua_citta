<div class="favorites-page">
  <div class="container">
    <h1>I Miei Preferiti</h1>

    <div *ngIf="favorites.length === 0" class="no-favorites">
      <div class="empty-state">
        <h2>Nessuno spettacolo preferito</h2>
        <p>Inizia ad aggiungere i tuoi spettacoli preferiti cliccando sul cuore!</p>
        <a routerLink="/" class="btn-home">Scopri gli spettacoli</a>
      </div>
    </div>

    <div *ngIf="favorites.length > 0" class="favorites-grid">
      <app-show-card *ngFor="let show of favorites" [show]="show"> </app-show-card>
    </div>
  </div>
</div>
